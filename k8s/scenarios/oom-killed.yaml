# =============================================================================
# Breakable Scenarios for Azure SRE Agent Energy Grid Demo
# =============================================================================
# This file contains a failure scenario that can be applied to the
# Energy Grid Platform for demonstrating Azure SRE Agent diagnosis
# capabilities.
#
# Apply with: kubectl apply -f k8s/scenarios/oom-killed.yaml
#
# See docs/BREAKABLE-SCENARIOS.md for detailed instructions.
# =============================================================================

# =============================================================================
# SCENARIO 1: OOMKilled - Meter Service Memory Exhaustion
# =============================================================================
# Smart meter data spike during peak demand overwhelms the meter-service.
# Scenario is intended to test whether SRE Agent can diagnose: "Pod is
# OOMKilled", and recommend increasing memory limits.
#
# HOW TO BREAK:
# kubectl apply -f k8s/scenarios/oom-killed.yaml
#
# HOW TO FIX:
# kubectl apply -f k8s/base/application.yaml
# =============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meter-service
  namespace: energy
  labels:
    app: meter-service
    scenario: oom-killed
    sre-demo: breakable
  annotations:
    sre.scenario: oom-killed
    sre.service: meter-service
    sre.namespace: energy
    sre.component: api
    sre.runbook_id: RB-001-oom-killed
    sre.root_cause_category: resource-exhaustion
    sre.change_source: deployment
    sre.version: "2026-04-25"
spec:
  replicas: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: meter-service
  template:
    metadata:
      labels:
        app: meter-service
      annotations:
        sre.scenario: oom-killed
        sre.service: meter-service
        sre.namespace: energy
        sre.component: api
        sre.runbook_id: RB-001-oom-killed
        sre.root_cause_category: resource-exhaustion
        sre.change_source: deployment
        sre.version: "2026-04-25"
    spec:
      nodeSelector:
        nodepool-type: user
      containers:
        - name: meter-service
          image: ghcr.io/azure-samples/aks-store-demo/order-service:latest
          ports:
            - containerPort: 3000
          # BREAKING CHANGE: Memory limit is way too low for meter data processing
          resources:
            requests:
              memory: "8Mi" # Extremely low
              cpu: "100m"
            limits:
              memory: "16Mi" # This will cause OOMKilled
              cpu: "200m"
          env:
            - name: ORDER_QUEUE_HOSTNAME
              value: "rabbitmq"
            - name: ORDER_QUEUE_PORT
              value: "5672"
            - name: ORDER_QUEUE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: rabbitmq-username
            - name: ORDER_QUEUE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: rabbitmq-password
            - name: ORDER_QUEUE_NAME
              value: "meter-events"
            - name: FASTIFY_ADDRESS
              value: "0.0.0.0"
            # Force memory allocation to trigger OOM faster
            - name: NODE_OPTIONS
              value: "--max-old-space-size=64"
