# =============================================================================
# SCENARIO 10: Service Selector Mismatch - Meter Service Routing Failure
# =============================================================================
# After a "v2 upgrade" the meter-service Service selector was changed to
# target pods labeled 'meter-service-v2', but actual pods still have
# 'meter-service'. This causes a silent outage.
#
# This is a subtle, realistic networking issue:
# - All pods show Running/Ready (no crashes, no restarts)
# - Grid dashboard loads fine (it's a client-side app)
# - But submitting meter readings fails silently (meter-service unreachable)
# - SRE Agent must check Service endpoints, not just pod status
#
# SRE Agent can diagnose: Empty endpoints, selector mismatch between Service
# and Deployment labels, recommend correcting the selector.
#
# HOW TO BREAK:
# kubectl apply -f k8s/scenarios/service-mismatch.yaml
#
# HOW TO FIX:
# kubectl apply -f k8s/base/application.yaml
# =============================================================================
---
apiVersion: v1
kind: Service
metadata:
  name: meter-service
  namespace: energy
  labels:
    scenario: service-mismatch
    sre-demo: breakable
spec:
  selector:
    # BREAKING CHANGE: Selector doesn't match any existing pods
    # Real pods have label: app=meter-service
    # This selector looks for app=meter-service-v2 (doesn't exist)
    app: meter-service-v2
  ports:
    - port: 3000
      targetPort: 3000
