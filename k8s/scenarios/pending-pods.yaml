# =============================================================================
# SCENARIO 5: Pending Pods - Substation Monitor Can't Schedule
# =============================================================================
# New substation monitoring pods request more resources than available,
# remaining stuck in Pending state — cluster capacity exhausted.
#
# Scenario is intended to test whether SRE Agent can diagnose: Pods pending due
# to insufficient resources, and recommend scaling the cluster or reducing
# resource requests.
#
# HOW TO BREAK:
# kubectl apply -f k8s/scenarios/pending-pods.yaml
#
# HOW TO FIX:
# kubectl delete deployment substation-monitor -n energy
# =============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: substation-monitor
  namespace: energy
  labels:
    app: substation-monitor
    scenario: pending-pods
    sre-demo: breakable
spec:
  replicas: 5
  selector:
    matchLabels:
      app: substation-monitor
  template:
    metadata:
      labels:
        app: substation-monitor
        scenario: pending-pods
    spec:
      nodeSelector:
        nodepool-type: user
      containers:
        - name: substation-monitor
          image: mcr.microsoft.com/mirror/docker/library/nginx:alpine
          resources:
            # BREAKING CHANGE: Requesting more resources than available
            requests:
              memory: "32Gi" # Excessive memory request
              cpu: "8" # Excessive CPU request
            limits:
              memory: "64Gi"
              cpu: "16"
