# =============================================================================
# SCENARIO 6: Failed Liveness Probe - Grid Health Monitor Misconfigured
# =============================================================================
# Grid health monitoring probe misconfigured after a maintenance window,
# causing Kubernetes to continuously restart the pod.
#
# Scenario is intended to test whether SRE Agent can diagnose: Pod restarts due
# to failed liveness probe, and recommend checking application health endpoint
# or probe configuration.
#
# HOW TO BREAK:
# kubectl apply -f k8s/scenarios/probe-failure.yaml
#
# HOW TO FIX:
# kubectl delete deployment grid-health-monitor -n energy
# =============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grid-health-monitor
  namespace: energy
  labels:
    app: grid-health-monitor
    scenario: probe-failure
    sre-demo: breakable
spec:
  replicas: 2
  selector:
    matchLabels:
      app: grid-health-monitor
  template:
    metadata:
      labels:
        app: grid-health-monitor
        scenario: probe-failure
    spec:
      nodeSelector:
        nodepool-type: user
      containers:
        - name: grid-health-app
          image: mcr.microsoft.com/mirror/docker/library/nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "50m"
          # BREAKING CHANGE: Liveness probe to endpoint that doesn't exist
          livenessProbe:
            httpGet:
              path: /health/nonexistent
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/nonexistent
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 3
