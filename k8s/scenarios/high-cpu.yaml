# =============================================================================
# SCENARIO 4: High CPU - Grid Frequency Calculation Overload
# =============================================================================
# Extreme weather event triggers intensive grid frequency calculations,
# consuming excessive CPU and affecting other workloads.
#
# Scenario is intended to test whether SRE Agent can diagnose: High CPU usage
# and resource contention, and recommend scaling, resource limits, or
# investigating the workload.
#
# HOW TO BREAK:
# kubectl apply -f k8s/scenarios/high-cpu.yaml
#
# HOW TO FIX:
# kubectl delete deployment frequency-calc-overload -n energy
# =============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frequency-calc-overload
  namespace: energy
  labels:
    app: frequency-calc-overload
    scenario: high-cpu
    sre-demo: breakable
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frequency-calc-overload
  template:
    metadata:
      labels:
        app: frequency-calc-overload
        scenario: high-cpu
    spec:
      nodeSelector:
        nodepool-type: user
      containers:
        - name: stress
          image: mcr.microsoft.com/mirror/docker/library/alpine:latest
          # BREAKING: Infinite CPU-intensive grid frequency calculation
          command: ["/bin/sh"]
          args:
            - "-c"
            - |
              echo "Starting grid frequency calculation overload..."
              while true; do
                # CPU-intensive calculation simulating grid frequency analysis
                for i in $(seq 1 10000); do
                  echo "scale=1000; 4*a(1)" | bc -l > /dev/null 2>&1 || true
                done
              done
          resources:
            requests:
              memory: "32Mi"
              cpu: "100m"
            # Intentionally high to allow resource consumption
            limits:
              memory: "64Mi"
              cpu: "2000m"
