# =============================================================================
# SCENARIO 2: CrashLoopBackOff - Asset Service Startup Failure
# =============================================================================
# The asset-service crashes on startup due to invalid grid configuration,
# entering a CrashLoopBackOff state.
#
# Scenario is intended to test whether SRE Agent can diagnose: Pod is in
# CrashLoopBackOff, container exit code, and recommend checking application logs
# and configuration.
#
# HOW TO BREAK:
# kubectl apply -f k8s/scenarios/crash-loop.yaml
#
# HOW TO FIX:
# kubectl apply -f k8s/base/application.yaml
# =============================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asset-service
  namespace: energy
  labels:
    app: asset-service
    scenario: crash-loop
    sre-demo: breakable
  annotations:
    sre.scenario: crash-loop
    sre.service: asset-service
    sre.namespace: energy
    sre.component: api
    sre.runbook_id: RB-002-crash-loop
    sre.root_cause_category: configuration
    sre.change_source: deployment
    sre.version: "2026-04-25"
spec:
  replicas: 2
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: asset-service
  template:
    metadata:
      labels:
        app: asset-service
      annotations:
        sre.scenario: crash-loop
        sre.service: asset-service
        sre.namespace: energy
        sre.component: api
        sre.runbook_id: RB-002-crash-loop
        sre.root_cause_category: configuration
        sre.change_source: deployment
        sre.version: "2026-04-25"
    spec:
      nodeSelector:
        nodepool-type: user
      containers:
        - name: asset-service
          image: ghcr.io/azure-samples/aks-store-demo/product-service:latest
          ports:
            - containerPort: 3002
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          env:
            # BREAKING CHANGE: Invalid forecast service URL causes startup failure
            - name: AI_SERVICE_URL
              value: "http://nonexistent-forecast:9999/"
          # BREAKING CHANGE: Command that causes immediate exit
          command: ["/bin/sh"]
          args: ["-c", "echo 'Starting with invalid grid config...'; exit 1"]
