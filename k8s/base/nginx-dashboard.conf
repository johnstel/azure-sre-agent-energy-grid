server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    location /api/assets/ {
        proxy_pass http://asset-service:3002/;
        proxy_set_header Host $host;
    }

    location /api/meter/ {
        proxy_pass http://meter-service:3000/;
        proxy_set_header Host $host;
    }

    location /api/dispatch/ {
        proxy_pass http://dispatch-service:3001/;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
