# =============================================================================
# Energy Grid Platform - Base Application Deployment
# =============================================================================
# This is the healthy baseline deployment of the Energy Grid Operations
# Platform for demonstrating Azure SRE Agent diagnosis capabilities.
#
# Architecture:
# - grid-dashboard: Vue.js consumer portal (usage, billing, outage maps)
# - ops-console: Vue.js grid operations console
# - meter-service: Node.js smart meter data ingestion
# - asset-service: Rust-based energy asset catalog
# - dispatch-service: Go energy dispatch and load balancing
# - forecast-service: Python energy demand forecasting (optional)
# - load-simulator: Retail consumer usage pattern generator
# - grid-worker: Dispatch processing simulator
#
# Data Services (in-cluster):
# - rabbitmq: Event bus (meter events, grid alerts, dispatch commands)
# - mongodb: Meter readings, energy transactions, grid state
# =============================================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: energy
  labels:
    app.kubernetes.io/part-of: energy-grid-demo
    sre-agent-demo: "true"

---
# =============================================================================
# RabbitMQ - Event Bus (meter events, grid alerts, dispatch commands)
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-enabled-plugins
  namespace: energy
  labels:
    app: rabbitmq
    sre-demo: breakable
data:
  enabled_plugins: "[rabbitmq_management,rabbitmq_prometheus,rabbitmq_amqp1_0]."

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: energy
  labels:
    app: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      nodeSelector:
        nodepool-type: user
      containers:
        - name: rabbitmq
          image: rabbitmq:3.11-management-alpine
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          volumeMounts:
            - name: rabbitmq-enabled-plugins
              mountPath: /etc/rabbitmq/enabled_plugins
              subPath: enabled_plugins
              readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "check_port_connectivity"]
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 20
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "check_port_connectivity"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 15
            failureThreshold: 6
          env:
            - name: RABBITMQ_PLUGINS
              value: "rabbitmq_management rabbitmq_prometheus rabbitmq_amqp1_0"
            - name: RABBITMQ_DEFAULT_USER
              value: "guest"
            - name: RABBITMQ_DEFAULT_PASS
              value: "guest"
      volumes:
        - name: rabbitmq-enabled-plugins
          configMap:
            name: rabbitmq-enabled-plugins
            items:
              - key: enabled_plugins
                path: enabled_plugins

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: energy
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672

---
# =============================================================================
# MongoDB - Meter Data Storage (Azure Managed Disk via CSI driver)
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-data-pvc
  namespace: energy
  labels:
    app: mongodb
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: managed-csi # Uses Azure Managed Disk CSI driver (default in AKS)
  resources:
    requests:
      storage: 8Gi

---
# =============================================================================
# MongoDB - Meter Database
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: energy
  labels:
    app: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      nodeSelector:
        nodepool-type: user
      containers:
        - name: mongodb
          image: mongo:4.4
          ports:
            - containerPort: 27017
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: mongodb-data-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: energy
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017

---
# =============================================================================
# Asset Service - Rust-based energy asset catalog API
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asset-service
  namespace: energy
  labels:
    app: asset-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: asset-service
  template:
    metadata:
      labels:
        app: asset-service
    spec:
      nodeSelector:
        nodepool-type: user
      containers:
        - name: asset-service
          image: ghcr.io/azure-samples/aks-store-demo/product-service:latest
          ports:
            - containerPort: 3002
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          env:
            - name: AI_SERVICE_URL
              value: "http://forecast-service:5001/"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: asset-service
  namespace: energy
spec:
  selector:
    app: asset-service
  ports:
    - port: 3002
      targetPort: 3002

---
# =============================================================================
# Meter Service - Node.js smart meter data ingestion API
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meter-service
  namespace: energy
  labels:
    app: meter-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: meter-service
  template:
    metadata:
      labels:
        app: meter-service
    spec:
      nodeSelector:
        nodepool-type: user
      containers:
        - name: meter-service
          image: ghcr.io/azure-samples/aks-store-demo/order-service:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          env:
            - name: ORDER_QUEUE_HOSTNAME
              value: "rabbitmq"
            - name: ORDER_QUEUE_PORT
              value: "5672"
            - name: ORDER_QUEUE_USERNAME
              value: "guest"
            - name: ORDER_QUEUE_PASSWORD
              value: "guest"
            - name: ORDER_QUEUE_NAME
              value: "meter-events"
            - name: FASTIFY_ADDRESS
              value: "0.0.0.0"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: meter-service
  namespace: energy
spec:
  selector:
    app: meter-service
  ports:
    - port: 3000
      targetPort: 3000

---
# =============================================================================
# Dispatch Service - Go energy dispatch and load balancing
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatch-service
  namespace: energy
  labels:
    app: dispatch-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dispatch-service
  template:
    metadata:
      labels:
        app: dispatch-service
    spec:
      nodeSelector:
        nodepool-type: user
      containers:
        - name: dispatch-service
          image: ghcr.io/azure-samples/aks-store-demo/makeline-service:latest
          ports:
            - containerPort: 3001
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          env:
            - name: ORDER_QUEUE_URI
              value: "amqp://guest:guest@rabbitmq:5672/"
            - name: ORDER_QUEUE_USERNAME
              value: "guest"
            - name: ORDER_QUEUE_PASSWORD
              value: "guest"
            - name: ORDER_QUEUE_NAME
              value: "meter-events"
            - name: ORDER_DB_URI
              value: "mongodb://mongodb:27017"
            - name: ORDER_DB_NAME
              value: "energydb"
            - name: ORDER_DB_COLLECTION_NAME
              value: "meter_readings"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: dispatch-service
  namespace: energy
spec:
  selector:
    app: dispatch-service
  ports:
    - port: 3001
      targetPort: 3001

---
# =============================================================================
# Grid Dashboard - Consumer portal (nginx serving custom HTML)
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grid-dashboard-html
  namespace: energy
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Grid Dashboard</title>
    <style>
      :root { --bg: #0f172a; --card: #1e293b; --accent: #22d3ee; --green: #34d399; --amber: #fbbf24; --red: #f87171; --text: #e2e8f0; --muted: #94a3b8; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
      header { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); border-bottom: 2px solid var(--accent); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
      header h1 { font-size: 1.4rem; font-weight: 600; display: flex; align-items: center; gap: .6rem; }
      header h1 span.icon { font-size: 1.6rem; }
      .status-bar { display: flex; gap: 1.5rem; font-size: .85rem; }
      .status-bar .item { display: flex; align-items: center; gap: .4rem; }
      .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
      .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
      .dot.amber { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
      .dot.red { background: var(--red); box-shadow: 0 0 6px var(--red); }
      main { padding: 1.5rem 2rem; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.2rem; margin-bottom: 1.5rem; }
      .card { background: var(--card); border-radius: 10px; padding: 1.2rem; border: 1px solid #334155; }
      .card h3 { font-size: .8rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .8rem; }
      .metric { font-size: 2rem; font-weight: 700; }
      .metric.cyan { color: var(--accent); }
      .metric.green { color: var(--green); }
      .metric.amber { color: var(--amber); }
      .metric sub { font-size: .7rem; font-weight: 400; color: var(--muted); }
      .section-title { font-size: 1rem; font-weight: 600; margin: 1.5rem 0 .8rem; color: var(--accent); border-bottom: 1px solid #334155; padding-bottom: .4rem; }
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: .6rem .8rem; text-align: left; border-bottom: 1px solid #334155; font-size: .85rem; }
      th { color: var(--muted); text-transform: uppercase; font-size: .75rem; letter-spacing: .06em; }
      .badge { padding: .15rem .5rem; border-radius: 4px; font-size: .75rem; font-weight: 600; }
      .badge.online { background: #064e3b; color: var(--green); }
      .badge.offline { background: #7f1d1d; color: var(--red); }
      .badge.warning { background: #78350f; color: var(--amber); }
      #assets-table tbody tr { transition: background .2s; }
      #assets-table tbody tr:hover { background: #334155; }
      .footer { text-align: center; padding: 2rem; color: var(--muted); font-size: .75rem; }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
      .loading { animation: pulse 1.5s infinite; color: var(--muted); }
    </style>
    </head>
    <body>
    <header>
      <h1><span class="icon">&#9889;</span> Energy Grid Dashboard</h1>
      <div class="status-bar">
        <div class="item"><span class="dot green"></span> Grid Online</div>
        <div class="item" id="clock"></div>
      </div>
    </header>
    <main>
      <div class="grid">
        <div class="card">
          <h3>Current Grid Load</h3>
          <div class="metric cyan" id="grid-load">--<sub> MW</sub></div>
        </div>
        <div class="card">
          <h3>Generation Capacity</h3>
          <div class="metric green" id="gen-capacity">--<sub> MW</sub></div>
        </div>
        <div class="card">
          <h3>Active Meters</h3>
          <div class="metric cyan" id="active-meters">--</div>
        </div>
        <div class="card">
          <h3>Grid Frequency</h3>
          <div class="metric green" id="grid-freq">--<sub> Hz</sub></div>
        </div>
        <div class="card">
          <h3>Dispatch Queue</h3>
          <div class="metric amber" id="dispatch-queue">--<sub> events</sub></div>
        </div>
        <div class="card">
          <h3>Avg Response Time</h3>
          <div class="metric cyan" id="response-time">--<sub> ms</sub></div>
        </div>
      </div>

      <h2 class="section-title">&#127981; Energy Assets</h2>
      <div class="card" style="overflow-x:auto;">
        <table id="assets-table">
          <thead><tr><th>Asset ID</th><th>Name</th><th>Type</th><th>Capacity</th><th>Status</th></tr></thead>
          <tbody id="assets-body"><tr><td colspan="5" class="loading">Loading energy assets...</td></tr></tbody>
        </table>
      </div>

      <h2 class="section-title">&#128200; Recent Meter Readings</h2>
      <div class="card" style="overflow-x:auto;">
        <table>
          <thead><tr><th>Timestamp</th><th>Meter ID</th><th>Zone</th><th>Reading (kWh)</th><th>Status</th></tr></thead>
          <tbody id="readings-body"></tbody>
        </table>
      </div>

      <h2 class="section-title">&#128506; Service Health</h2>
      <div class="grid" id="health-cards"></div>
    </main>
    <div class="footer">Contoso Energy &mdash; Grid Operations Platform &mdash; Azure SRE Agent Demo Lab</div>

    <script>
    const SERVICES = [
      { name: 'Asset Service', url: '/api/assets/health', port: 3002 },
      { name: 'Meter Service', url: '/api/meter/health', port: 3000 },
      { name: 'Dispatch Service', url: '/api/dispatch/health', port: 3001 },
      { name: 'MongoDB', url: null },
      { name: 'RabbitMQ', url: null },
    ];

    const ZONES = ['Zone-A North', 'Zone-B Central', 'Zone-C South', 'Zone-D East', 'Zone-E West'];
    const ASSET_TYPES = ['Solar Farm', 'Wind Turbine', 'Gas Turbine', 'Hydroelectric', 'Battery Storage', 'Substation'];
    const ASSET_NAMES = ['Ridgeline Solar Alpha', 'Cedar Wind Farm', 'Riverside Gas Unit 3', 'Lakeview Hydro Station', 'Eastport Battery Grid', 'Northgate Substation 7', 'Summit Solar Bravo', 'Pinecrest Wind Array', 'Valley Gas Peaker 1', 'Harbor Hydro Complex'];

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function fmt(n) { return n.toLocaleString(); }

    function updateClock() {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString();
    }

    function updateMetrics() {
      document.getElementById('grid-load').innerHTML = fmt(rand(2800, 4200)) + '<sub> MW</sub>';
      document.getElementById('gen-capacity').innerHTML = fmt(rand(5000, 6500)) + '<sub> MW</sub>';
      document.getElementById('active-meters').textContent = fmt(rand(142000, 158000));
      document.getElementById('grid-freq').innerHTML = (59.95 + Math.random() * 0.1).toFixed(3) + '<sub> Hz</sub>';
      document.getElementById('dispatch-queue').innerHTML = rand(12, 85) + '<sub> events</sub>';
      document.getElementById('response-time').innerHTML = rand(18, 120) + '<sub> ms</sub>';
    }

    function loadAssets() {
      fetch('/api/assets/')
        .then(r => r.json())
        .then(items => {
          const tbody = document.getElementById('assets-body');
          tbody.innerHTML = '';
          items.forEach((item, i) => {
            const type = ASSET_TYPES[i % ASSET_TYPES.length];
            const assetName = ASSET_NAMES[i % ASSET_NAMES.length];
            const capacity = rand(50, 500) + ' MW';
            const statusRoll = Math.random();
            const status = statusRoll > 0.15 ? 'online' : statusRoll > 0.05 ? 'warning' : 'offline';
            const label = status === 'online' ? 'Online' : status === 'warning' ? 'Degraded' : 'Offline';
            const tr = document.createElement('tr');
            tr.innerHTML = '<td>EGA-' + String(item.id || i+1).padStart(4,'0') + '</td>' +
              '<td>' + assetName + '</td>' +
              '<td>' + type + '</td><td>' + capacity + '</td>' +
              '<td><span class="badge ' + status + '">' + label + '</span></td>';
            tbody.appendChild(tr);
          });
        })
        .catch(() => {
          document.getElementById('assets-body').innerHTML =
            '<tr><td colspan="5" style="color:var(--red)">&#9888; Unable to reach Asset Service</td></tr>';
        });
    }

    function loadReadings() {
      const tbody = document.getElementById('readings-body');
      tbody.innerHTML = '';
      for (let i = 0; i < 8; i++) {
        const d = new Date(Date.now() - i * rand(30000, 120000));
        const tr = document.createElement('tr');
        tr.innerHTML = '<td>' + d.toLocaleTimeString() + '</td>' +
          '<td>SM-' + rand(10000,99999) + '</td>' +
          '<td>' + ZONES[rand(0, ZONES.length-1)] + '</td>' +
          '<td>' + (Math.random() * 45 + 5).toFixed(2) + '</td>' +
          '<td><span class="badge online">OK</span></td>';
        tbody.appendChild(tr);
      }
    }

    function loadHealth() {
      const container = document.getElementById('health-cards');
      container.innerHTML = '';
      SERVICES.forEach(svc => {
        const card = document.createElement('div');
        card.className = 'card';
        if (svc.url) {
          card.innerHTML = '<h3>' + svc.name + '</h3><div class="loading">Checking...</div>';
          fetch(svc.url, { signal: AbortSignal.timeout(3000) })
            .then(r => { card.innerHTML = '<h3>' + svc.name + '</h3><div class="metric green" style="font-size:1.2rem"><span class="dot green"></span> Healthy</div>'; })
            .catch(() => { card.innerHTML = '<h3>' + svc.name + '</h3><div class="metric" style="font-size:1.2rem;color:var(--red)"><span class="dot red"></span> Unreachable</div>'; });
        } else {
          card.innerHTML = '<h3>' + svc.name + '</h3><div class="metric" style="font-size:1.2rem;color:var(--muted)"><span class="dot green"></span> In-Cluster</div>';
        }
        container.appendChild(card);
      });
    }

    updateClock(); updateMetrics(); loadAssets(); loadReadings(); loadHealth();
    setInterval(updateClock, 1000);
    setInterval(updateMetrics, 5000);
    setInterval(loadReadings, 15000);
    setInterval(loadHealth, 30000);
    setInterval(loadAssets, 60000);
    </script>
    </body>
    </html>


---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grid-dashboard-nginx
  namespace: energy
data:
  default.conf: |
    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        resolver kube-dns.kube-system.svc.cluster.local valid=5s;

        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
        location /api/assets/ {
            set $asset_backend http://asset-service.energy.svc.cluster.local:3002;
            proxy_pass $asset_backend/;
        }
        location /api/meter/ {
            set $meter_backend http://meter-service.energy.svc.cluster.local:3000;
            proxy_pass $meter_backend/;
        }
        location /api/dispatch/ {
            set $dispatch_backend http://dispatch-service.energy.svc.cluster.local:3001;
            proxy_pass $dispatch_backend/;
        }
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grid-dashboard
  namespace: energy
  labels:
    app: grid-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: grid-dashboard
  template:
    metadata:
      labels:
        app: grid-dashboard
    spec:
      nodeSelector:
        nodepool-type: user
      containers:
        - name: grid-dashboard
          image: nginx:alpine
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: html
          configMap:
            name: grid-dashboard-html
        - name: nginx-conf
          configMap:
            name: grid-dashboard-nginx

---
apiVersion: v1
kind: Service
metadata:
  name: grid-dashboard
  namespace: energy
spec:
  type: LoadBalancer
  selector:
    app: grid-dashboard
  ports:
    - port: 80
      targetPort: 8080

---
# =============================================================================
# Ops Console - Grid operations console (nginx serving custom HTML)
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: ops-console-html
  namespace: energy
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Operations Console</title>
    <style>
      :root { --bg: #0f172a; --card: #1e293b; --accent: #a78bfa; --green: #34d399; --amber: #fbbf24; --red: #f87171; --cyan: #22d3ee; --text: #e2e8f0; --muted: #94a3b8; }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
      header { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); border-bottom: 2px solid var(--accent); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
      header h1 { font-size: 1.4rem; font-weight: 600; display: flex; align-items: center; gap: .6rem; }
      .header-left { display: flex; align-items: center; gap: 1.25rem; flex-wrap: wrap; }
      .view-toggle { display: inline-flex; gap: .25rem; padding: .25rem; border: 1px solid rgba(167,139,250,.45); border-radius: 999px; background: rgba(15,23,42,.55); }
      .view-toggle button { border: 0; border-radius: 999px; padding: .45rem .8rem; color: var(--muted); background: transparent; font: inherit; font-size: .85rem; cursor: pointer; }
      .view-toggle button:hover, .view-toggle button:focus-visible { color: var(--text); outline: 2px solid rgba(34,211,238,.55); outline-offset: 2px; }
      .view-toggle button[aria-selected="true"] { color: #0f172a; background: var(--green); box-shadow: 0 0 12px rgba(52,211,153,.35); font-weight: 700; }
      .status-bar { display: flex; gap: 1.5rem; font-size: .85rem; }
      .status-bar .item { display: flex; align-items: center; gap: .4rem; }
      .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
      .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
      .dot.amber { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
      .dot.red { background: var(--red); box-shadow: 0 0 6px var(--red); }
      .dot.unknown { background: #94a3b8; box-shadow: 0 0 6px rgb(148 163 184 / 0.45); }
      main { padding: 1.5rem 2rem; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.2rem; margin-bottom: 1.5rem; }
      .card { background: var(--card); border-radius: 10px; padding: 1.2rem; border: 1px solid #334155; }
      .card h3 { font-size: .8rem; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: .8rem; }
      .metric { font-size: 2rem; font-weight: 700; }
      .metric sub { font-size: .7rem; font-weight: 400; color: var(--muted); }
      .section-title { font-size: 1rem; font-weight: 600; margin: 1.5rem 0 .8rem; color: var(--accent); border-bottom: 1px solid #334155; padding-bottom: .4rem; }
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: .6rem .8rem; text-align: left; border-bottom: 1px solid #334155; font-size: .85rem; }
      th { color: var(--muted); text-transform: uppercase; font-size: .75rem; letter-spacing: .06em; }
      .badge { padding: .15rem .5rem; border-radius: 4px; font-size: .75rem; font-weight: 600; }
      .badge.online { background: #064e3b; color: var(--green); }
      .badge.offline { background: #7f1d1d; color: var(--red); }
      .badge.warning { background: #78350f; color: var(--amber); }
      .badge.processing { background: #1e1b4b; color: var(--accent); }
      .footer { text-align: center; padding: 2rem; color: var(--muted); font-size: .75rem; }
      .log-box { background: #0d1117; border: 1px solid #334155; border-radius: 8px; padding: 1rem; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: .8rem; max-height: 220px; overflow-y: auto; line-height: 1.6; }
      .log-box .ts { color: var(--muted); }
      .log-box .info { color: var(--cyan); }
      .log-box .warn { color: var(--amber); }
      .log-box .err { color: var(--red); }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
      .loading { animation: pulse 1.5s infinite; color: var(--muted); }
      .app-view[hidden] { display: none; }
      .map-toolbar { display: flex; gap: .6rem; align-items: center; justify-content: space-between; flex-wrap: wrap; margin-bottom: .8rem; }
      .map-controls { display: flex; gap: .5rem; flex-wrap: wrap; }
      .map-button { background: #0f172a; border: 1px solid #475569; border-radius: 8px; color: var(--text); padding: .45rem .65rem; cursor: pointer; font: inherit; font-size: .85rem; }
      .map-button:hover, .map-button:focus-visible { border-color: var(--cyan); outline: 2px solid rgba(34,211,238,.75); outline-offset: 2px; }
      .map-meta { color: var(--muted); font-size: .8rem; }
      .map-disclaimer { border: 1px solid rgba(251,191,36,.35); background: rgba(120,53,15,.18); color: #fde68a; border-radius: 10px; padding: .8rem 1rem; margin-bottom: 1rem; font-size: .86rem; line-height: 1.45; }
      .map-health-banner { border: 1px solid rgba(148,163,184,.38); background: rgba(15,23,42,.82); color: #cbd5e1; border-radius: 10px; padding: .75rem 1rem; margin-bottom: 1rem; font-size: .86rem; line-height: 1.45; }
      .map-health-banner.warning { border-color: rgba(251,191,36,.58); background: rgba(120,53,15,.22); color: #fde68a; }
      .map-health-banner[hidden] { display: none; }
      .grid-map-shell { position: relative; min-height: 560px; border: 1px solid #334155; border-radius: 12px; overflow: hidden; background: radial-gradient(circle at 50% 0%, rgba(34,211,238,.12), transparent 36%), linear-gradient(180deg, rgba(15,23,42,.96), rgba(2,6,23,.98)); }
      .grid-map-svg { width: 100%; height: 560px; display: block; touch-action: none; cursor: grab; }
      .grid-map-svg:active { cursor: grabbing; }
      .grid-map-svg:focus-visible { outline: 3px solid rgba(34,211,238,.6); outline-offset: -3px; }
      .map-fallback { position: absolute; inset: 0; display: grid; place-items: center; padding: 2rem; text-align: center; background: rgba(15,23,42,.96); color: var(--muted); line-height: 1.5; }
      .map-fallback[hidden] { display: none; }
      .map-edge { stroke: #64748b; stroke-width: 2.4; fill: none; opacity: .82; }
      .map-edge.healthy { stroke: var(--green); opacity: .86; }
      .map-edge.warning { stroke: var(--amber); stroke-width: 3; opacity: .9; }
      .map-edge.critical { stroke: var(--red); stroke-width: 3.4; opacity: .95; filter: drop-shadow(0 0 6px rgba(248,113,113,.45)); }
      .map-edge.unknown { stroke: #94a3b8; stroke-dasharray: 8 7; opacity: .58; }
      .map-edge.disabled { stroke: #94a3b8; stroke-dasharray: 3 7; opacity: .5; }
      .map-edge-label { fill: #cbd5e1; font-size: 11px; paint-order: stroke; stroke: #020617; stroke-width: 4px; stroke-linejoin: round; }
      .map-node .node-box { fill: #182338; stroke: #475569; stroke-width: 1.5; filter: drop-shadow(0 10px 18px rgba(2,6,23,.45)); }
      .map-node.service .node-box { stroke: rgba(34,211,238,.65); }
      .map-node.datastore .node-box, .map-node.datastore .node-cap { fill: #14213a; stroke: rgba(167,139,250,.75); stroke-width: 1.5; }
      .map-node.healthy .node-box, .map-node.datastore.healthy .node-box, .map-node.datastore.healthy .node-cap { fill: rgba(6,78,59,.92); stroke: var(--green); stroke-width: 2.2; filter: drop-shadow(0 0 14px rgba(52,211,153,.36)); }
      .map-node.warning .node-box, .map-node.datastore.warning .node-box, .map-node.datastore.warning .node-cap { fill: rgba(120,53,15,.92); stroke: var(--amber); stroke-width: 2.4; filter: drop-shadow(0 0 14px rgba(251,191,36,.34)); }
      .map-node.critical .node-box, .map-node.datastore.critical .node-box, .map-node.datastore.critical .node-cap { fill: rgba(127,29,29,.92); stroke: var(--red); stroke-width: 2.6; filter: drop-shadow(0 0 16px rgba(248,113,113,.48)); }
      .map-node.unknown .node-box, .map-node.datastore.unknown .node-box, .map-node.datastore.unknown .node-cap { fill: rgba(30,41,59,.88); stroke: #94a3b8; stroke-dasharray: 7 5; }
      .map-node.static .node-box, .map-node.datastore.static .node-box, .map-node.datastore.static .node-cap { fill: rgba(30,41,59,.92); stroke: #cbd5e1; stroke-width: 1.8; }
      .map-node.disabled .node-box { stroke-dasharray: 7 5; opacity: .72; }
      .map-node text { pointer-events: none; }
      .map-node-symbol { fill: #f8fafc; font-size: 13px; font-weight: 800; }
      .map-node-title { fill: var(--text); font-size: 14px; font-weight: 700; }
      .map-node-subtitle { fill: var(--muted); font-size: 11px; }
      .map-node-status { fill: #94a3b8; font-size: 10px; text-transform: uppercase; letter-spacing: .04em; }
      .map-status-dot { fill: #94a3b8; }
      .map-status-dot.healthy { fill: var(--green); filter: drop-shadow(0 0 5px rgba(52,211,153,.85)); }
      .map-status-dot.warning { fill: var(--amber); filter: drop-shadow(0 0 5px rgba(251,191,36,.85)); }
      .map-status-dot.critical { fill: var(--red); filter: drop-shadow(0 0 5px rgba(248,113,113,.85)); }
      .map-status-dot.static { fill: #cbd5e1; }
      .map-status-dot.unknown { fill: #94a3b8; }
      .map-status-dot.disabled { fill: var(--amber); }
      @media (max-width: 799px), (max-height: 499px) {
        .grid-map-shell { min-height: 260px; }
        .grid-map-svg { display: none; }
        .map-fallback { display: grid; }
      }
      @media (prefers-reduced-motion: reduce) {
        .loading { animation: none; }
        .map-status-dot.healthy, .map-status-dot.warning, .map-status-dot.critical { filter: none; }
      }
      .node-ring, .node-focus-ring { fill: none; stroke: none; pointer-events: none; }
      .map-node.selected .node-ring { stroke: var(--cyan); stroke-width: 3; filter: drop-shadow(0 0 8px rgba(34,211,238,.75)); }
      .map-node:focus-visible { outline: none; }
      .map-node:focus-visible .node-focus-ring { stroke: rgba(255,255,255,.88); stroke-width: 2; stroke-dasharray: 6 4; filter: drop-shadow(0 0 6px rgba(255,255,255,.45)); }
      .map-node.dimmed { opacity: 0.52; }
      .map-edge.dimmed { opacity: 0.45; pointer-events: none; }
      .map-edge.selected { stroke: var(--cyan) !important; stroke-width: 5 !important; opacity: 1 !important; filter: drop-shadow(0 0 8px rgba(34,211,238,.65)); }
      .map-edge-hit { stroke: transparent; stroke-width: 14; fill: none; cursor: pointer; }
      .filter-bar { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; margin-bottom: .75rem; }
      .filter-btn { background: rgba(15,23,42,.8); border: 1px solid #475569; border-radius: 8px; color: var(--muted); padding: .35rem .7rem; cursor: pointer; font: inherit; font-size: .82rem; display: inline-flex; align-items: center; gap: .4rem; }
      .filter-btn:hover, .filter-btn:focus-visible { border-color: var(--cyan); color: var(--text); outline: 2px solid rgba(34,211,238,.75); outline-offset: 2px; }
      .filter-btn[aria-pressed="true"] { background: rgba(34,211,238,.15); border-color: var(--cyan); color: var(--cyan); font-weight: 600; }
      .filter-btn[data-filter="critical"][aria-pressed="true"] { background: rgba(248,113,113,.15); border-color: var(--red); color: var(--red); }
      .filter-btn[data-filter="warning"][aria-pressed="true"] { background: rgba(251,191,36,.15); border-color: var(--amber); color: var(--amber); }
      .filter-badge { display: inline-block; min-width: 1.3em; padding: .1em .35em; background: rgba(255,255,255,.1); border-radius: 999px; font-size: .75em; font-weight: 700; text-align: center; line-height: 1.4; }
      .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
      /* Detail Drawer */
      .detail-drawer { position: absolute; top: 0; right: 0; width: min(340px, 100%); height: 100%; background: rgba(15,23,42,.97); border-left: 1px solid #334155; border-radius: 0 12px 12px 0; padding: 1rem 1.1rem; overflow-y: auto; z-index: 10; display: flex; flex-direction: column; gap: .7rem; }
      .detail-drawer[hidden] { display: none; }
      .drawer-header { display: flex; align-items: flex-start; justify-content: space-between; gap: .5rem; }
      .drawer-close { background: none; border: 1px solid #475569; border-radius: 6px; color: var(--muted); padding: .25rem .55rem; cursor: pointer; font: inherit; font-size: 1rem; line-height: 1; flex-shrink: 0; }
      .drawer-close:hover, .drawer-close:focus-visible { border-color: var(--cyan); color: var(--text); outline: 2px solid rgba(34,211,238,.75); outline-offset: 2px; }
      .drawer-title { font-size: .95rem; font-weight: 700; color: var(--text); line-height: 1.3; margin: 0; }
      .drawer-subtitle { font-size: .78rem; color: var(--muted); margin-top: .15rem; }
      .drawer-section { border-top: 1px solid #334155; padding-top: .6rem; }
      .drawer-section-title { font-size: .7rem; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin: 0 0 .45rem; }
      .drawer-row { display: flex; justify-content: space-between; gap: .5rem; font-size: .82rem; margin-bottom: .3rem; line-height: 1.4; }
      .drawer-label { color: var(--muted); flex-shrink: 0; }
      .drawer-value { color: var(--text); text-align: right; }
      .drawer-value.healthy { color: var(--green); }
      .drawer-value.warning { color: var(--amber); }
      .drawer-value.critical { color: var(--red); }
      .drawer-value.unknown, .drawer-value.static { color: var(--muted); }
      .drawer-value.disabled { color: var(--amber); }
      .drawer-assessment { font-size: .8rem; color: #cbd5e1; line-height: 1.5; background: rgba(51,65,85,.4); border-radius: 6px; padding: .5rem .65rem; margin-top: .2rem; }
      .drawer-unavailable { font-size: .79rem; color: var(--muted); font-style: italic; line-height: 1.45; }
      .drawer-citation { font-size: .73rem; color: var(--muted); border-top: 1px solid #334155; margin-top: auto; line-height: 1.4; padding-top: .55rem; }
      /* === #20 Handoff controls === */
      .drawer-handoff { border-top: 1px solid #334155; padding-top: .6rem; }
      .drawer-handoff-actions { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: .4rem; }
      .drawer-handoff-btn { background: rgba(15,23,42,.8); border: 1px solid #475569; border-radius: 8px; color: var(--text); padding: .4rem .75rem; cursor: pointer; font: inherit; font-size: .82rem; text-decoration: none; display: inline-block; }
      .drawer-handoff-btn:hover, .drawer-handoff-btn:focus-visible { border-color: var(--cyan); outline: 2px solid rgba(34,211,238,.75); outline-offset: 2px; }
      .drawer-handoff-btn.portal { border-color: rgba(167,139,250,.5); color: var(--accent); }
      .drawer-handoff-btn.portal:hover, .drawer-handoff-btn.portal:focus-visible { border-color: var(--accent); }
      .drawer-copy-status { font-size: .78rem; min-height: 1.3em; color: var(--green); line-height: 1.4; }
      .drawer-prompt-preview { margin-top: .4rem; }
      .drawer-prompt-preview summary { cursor: pointer; color: var(--muted); font-size: .78rem; }
      .drawer-prompt-preview pre { margin: .3rem 0 0; padding: .45rem .6rem; background: rgba(15,23,42,.85); border: 1px solid #334155; border-radius: 6px; color: #cbd5e1; font-size: .75rem; line-height: 1.5; white-space: pre-wrap; word-break: break-word; max-height: 9rem; overflow-y: auto; }
      @keyframes skeleton-pulse { 0%,100% { opacity: .55; } 50% { opacity: .22; } }
      .skeleton { background: #334155; border-radius: 4px; animation: skeleton-pulse 1.4s ease-in-out infinite; height: .85em; margin-bottom: .3rem; display: block; }
      .skeleton.short { width: 52%; }
      .skeleton.long { width: 82%; }
      @media (max-width: 799px) { .detail-drawer { position: static; width: 100%; height: auto; border-left: none; border-radius: 10px; border: 1px solid #334155; margin-top: .75rem; } }
      @media (prefers-reduced-motion: reduce) { .skeleton { animation: none; opacity: .45; } }
      /* === #21 Responsive drawer breakpoints === */
      /* 800-1279px: bottom sheet */
      @media (min-width: 800px) and (max-width: 1279px) {
        .detail-drawer { position: absolute; top: auto; bottom: 0; right: 0; left: 0; width: 100%; max-height: 260px; height: 40%; border-top: 1px solid #334155; border-left: none; border-radius: 12px 12px 0 0; }
      }
      /* >=1920px: docked side panel */
      @media (min-width: 1920px) {
        .grid-map-shell { overflow: visible; min-height: 640px; display: grid; grid-template-columns: 1fr; grid-template-rows: minmax(640px, 1fr); }
        .grid-map-shell:has(.detail-drawer:not([hidden])) { grid-template-columns: 1fr 340px; }
        .grid-map-svg { grid-column: 1; grid-row: 1; height: 640px; }
        .map-fallback { grid-column: 1; grid-row: 1; }
        .detail-drawer { position: static !important; grid-column: 2; grid-row: 1; width: 100%; height: 640px; max-height: 640px; border-left: 1px solid #334155; border-radius: 0 12px 12px 0; }
        .map-node-title { font-size: 16px; }
        .map-node-symbol { font-size: 15px; }
        .map-node-subtitle { font-size: 13px; }
        .map-node-status { font-size: 11px; }
      }
      /* === #21 Drawer enter animations === */
      @keyframes drawer-slide-right-in { from { transform: translateX(12%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
      @keyframes drawer-slide-up-in { from { transform: translateY(10%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      @media (min-width: 1280px) and (max-width: 1919px) { .detail-drawer:not([hidden]) { animation: drawer-slide-right-in 0.22s ease; } }
      @media (min-width: 800px) and (max-width: 1279px) { .detail-drawer:not([hidden]) { animation: drawer-slide-up-in 0.22s ease; } }
      /* === #21 Reduced-motion: disable all nonessential animation === */
      @media (prefers-reduced-motion: reduce) { .detail-drawer:not([hidden]) { animation: none !important; } .loading { animation: none; } }
      /* === #21 Disclaimer always visible above map shell === */
      .map-disclaimer { position: relative; z-index: 2; }
    </style>
    </head>
     <body>
     <header>
       <div class="header-left">
         <h1>&#9881; Grid Operations Console</h1>
         <nav class="view-toggle" role="tablist" aria-label="Console views">
           <button type="button" id="operations-tab" role="tab" aria-controls="operations-view" data-view-target="operations" aria-selected="true">Operations</button>
           <button type="button" id="map-tab" role="tab" aria-controls="map-view" data-view-target="map" aria-selected="false">Grid Map</button>
         </nav>
       </div>
       <div class="status-bar">
         <div class="item"><span class="dot green"></span> Operator Mode</div>
         <div class="item" id="clock"></div>
       </div>
     </header>
     <main>
       <section id="operations-view" class="app-view" role="tabpanel" aria-labelledby="operations-tab" data-view="operations">
         <div class="grid">
           <div class="card">
             <h3>Dispatch Queue Depth</h3>
             <div class="metric" style="color:var(--accent)" id="queue-depth">--</div>
           </div>
           <div class="card">
             <h3>Active Dispatches</h3>
             <div class="metric" style="color:var(--cyan)" id="active-dispatches">--</div>
           </div>
           <div class="card">
             <h3>Grid Efficiency</h3>
             <div class="metric" style="color:var(--green)" id="efficiency">--<sub> %</sub></div>
           </div>
           <div class="card">
             <h3>Alert Count (24h)</h3>
             <div class="metric" style="color:var(--amber)" id="alert-count">--</div>
           </div>
         </div>

         <h2 class="section-title">&#128640; Active Dispatch Orders</h2>
         <div class="card" style="overflow-x:auto">
           <table>
             <thead><tr><th>Dispatch ID</th><th>Type</th><th>Zone</th><th>Priority</th><th>Status</th><th>Assigned</th></tr></thead>
             <tbody id="dispatch-body"></tbody>
           </table>
         </div>

         <h2 class="section-title">&#127981; Energy Asset Inventory</h2>
         <div class="card" style="overflow-x:auto">
           <table>
             <thead><tr><th>Asset ID</th><th>Name</th><th>Type</th><th>Output</th><th>Efficiency</th><th>Status</th></tr></thead>
             <tbody id="assets-body"><tr><td colspan="6" class="loading">Loading assets...</td></tr></tbody>
           </table>
         </div>

         <h2 class="section-title">&#128195; Operations Log</h2>
         <div class="log-box" id="ops-log"></div>

         <h2 class="section-title">&#128506; Platform Health</h2>
         <div class="grid" id="health-grid"></div>
       </section>

       <section id="map-view" class="app-view" role="tabpanel" aria-labelledby="map-tab" data-view="map" hidden>
         <div class="map-toolbar">
           <div>
             <h2 class="section-title" style="margin-top:0">&#128506; Cloud Demo Grid Map</h2>
              <div class="map-meta">Topology and live service health use the approved cloud grid-map data contract. Live checks poll every 30 seconds.</div>
           </div>
           <div class="map-controls" role="group" aria-label="Grid map controls">
             <button class="map-button" type="button" id="map-zoom-in">Zoom in</button>
             <button class="map-button" type="button" id="map-zoom-out">Zoom out</button>
             <button class="map-button" type="button" id="map-reset">Fit / Reset</button>
           </div>
         </div>
          <div class="filter-bar" role="group" aria-label="Severity filter">
            <span style="color:var(--muted);font-size:.82rem">Filter:</span>
            <button class="filter-btn" type="button" data-filter="all" aria-pressed="true">All <span class="filter-badge" id="badge-all" aria-label="loading">—</span></button>
            <button class="filter-btn" type="button" data-filter="critical" aria-pressed="false">Critical <span class="filter-badge" id="badge-critical" aria-label="loading">—</span></button>
            <button class="filter-btn" type="button" data-filter="warning" aria-pressed="false">Warning <span class="filter-badge" id="badge-warning" aria-label="loading">—</span></button>
          </div>
          <div class="map-disclaimer" role="note">
            Demo topology only. This map visualizes Kubernetes service/application health for the Azure SRE Agent demo and is not connected to real grid telemetry, SCADA, GIS, or utility infrastructure.
          </div>
          <div class="map-health-banner warning" id="map-health-banner" role="status" aria-live="polite">
            Live service health has not been received yet. Static and optional nodes are shown in a safe unknown/static state.
          </div>
          <p class="sr-only" id="map-instructions">Interactive topology map. Tab between nodes, Enter to select, Escape to deselect. Use arrow keys to pan, + / &#8722; to zoom, 0 to fit.</p>
          <div id="map-selection-status" role="status" aria-live="polite" class="sr-only"></div>
          <div class="card">
           <div class="grid-map-shell" id="grid-map-shell">
             <svg id="grid-map-svg" class="grid-map-svg" role="application" aria-roledescription="interactive topology map" aria-label="Interactive cloud demo topology map" aria-describedby="map-instructions" tabindex="0">
               <g id="grid-map-stage"></g>
             </svg>
             <div class="map-fallback" id="map-fallback" hidden>
               <div>
                 <strong>Grid map requires a larger screen.</strong><br>
                  Use the wallboard view on a wider display for the interactive topology.
               </div>
             </div>
              <aside id="detail-drawer" class="detail-drawer" hidden aria-labelledby="drawer-title">
                <div class="drawer-header">
                  <div>
                    <h2 class="drawer-title" id="drawer-title"></h2>
                    <div class="drawer-subtitle" id="drawer-subtitle"></div>
                  </div>
                  <button type="button" class="drawer-close" id="drawer-close" aria-label="Close detail panel">&#x2715;</button>
                </div>
                <div id="drawer-body"></div>
                <div class="drawer-citation" id="drawer-citation"></div>
              </aside>
           </div>
         </div>
       </section>
     </main>
    <div class="footer">Contoso Energy &mdash; Grid Operations Console &mdash; Azure SRE Agent Demo Lab</div>

    <script>
    const ZONES = ['Zone-A North', 'Zone-B Central', 'Zone-C South', 'Zone-D East', 'Zone-E West'];
    const DISPATCH_TYPES = ['Load Balance', 'Frequency Adj', 'Capacity Shift', 'Emergency Shed', 'Reserve Activate', 'Ramp Up', 'Ramp Down'];
     const PRIORITIES = ['Critical', 'High', 'Medium', 'Low'];
     const ASSET_TYPES = ['Solar Farm', 'Wind Array', 'Gas Turbine', 'Hydroelectric', 'Battery Bank', 'Substation'];
     const ASSET_NAMES = ['Ridgeline Solar Alpha', 'Cedar Wind Farm', 'Riverside Gas Unit 3', 'Lakeview Hydro Station', 'Eastport Battery Grid', 'Northgate Substation 7', 'Summit Solar Bravo', 'Pinecrest Wind Array', 'Valley Gas Peaker 1', 'Harbor Hydro Complex'];
     const GRID_TOPOLOGY = {
       schemaVersion: '1.0',
       host: 'ops-console',
       namespace: 'energy',
       disclaimer: 'Demo topology only. This map visualizes Kubernetes service/application health for the Azure SRE Agent demo and is not connected to real grid telemetry, SCADA, GIS, or utility infrastructure.',
       nodes: [
         { id: 'grid-dashboard', label: 'Consumer Portal', resourceName: 'grid-dashboard', metaphor: 'Customer Energy Portal', kind: 'service', position: { x: 120, y: 120 }, healthSource: 'static' },
         { id: 'ops-console', label: 'Grid Operations Console', resourceName: 'ops-console', metaphor: 'Control Room', kind: 'service', position: { x: 120, y: 320 }, healthSource: 'static' },
         { id: 'meter-service', label: 'Meter Service', resourceName: 'meter-service', metaphor: 'Smart Meter Ingestion', kind: 'service', position: { x: 360, y: 120 }, healthSource: 'live', healthPath: '/api/meter/health' },
         { id: 'asset-service', label: 'Asset Service', resourceName: 'asset-service', metaphor: 'Asset Catalog', kind: 'service', position: { x: 360, y: 320 }, healthSource: 'live', healthPath: '/api/assets/health' },
         { id: 'dispatch-service', label: 'Dispatch Service', resourceName: 'dispatch-service', metaphor: 'Energy Dispatch', kind: 'service', position: { x: 600, y: 220 }, healthSource: 'live', healthPath: '/api/dispatch/health' },
         { id: 'rabbitmq', label: 'RabbitMQ', resourceName: 'rabbitmq', metaphor: 'Event Bus', kind: 'datastore', position: { x: 600, y: 60 }, healthSource: 'static' },
         { id: 'mongodb', label: 'MongoDB', resourceName: 'mongodb', metaphor: 'Meter Data Store', kind: 'datastore', position: { x: 840, y: 220 }, healthSource: 'static' },
         { id: 'load-simulator', label: 'Load Simulator', resourceName: 'load-simulator', metaphor: 'Consumer Demand Simulator', kind: 'service', position: { x: 360, y: 520 }, healthSource: 'static' },
         { id: 'grid-worker', label: 'Grid Worker', resourceName: 'grid-worker', metaphor: 'Dispatch Worker', kind: 'service', position: { x: 600, y: 520 }, healthSource: 'static', replicas: 0, stateNote: 'Disabled in application.yaml with replicas: 0 due to AMQP protocol mismatch' },
         { id: 'forecast-service', label: 'Forecast Service', resourceName: 'forecast-service', metaphor: 'Demand Forecast', kind: 'service', position: { x: 840, y: 420 }, healthSource: 'optional', optional: true, absentBehavior: 'Render as unknown with label Optional service absent in current deployment' }
       ],
       edges: [
         { source: 'grid-dashboard', target: 'meter-service', label: 'Usage and billing data', type: 'sync' },
         { source: 'grid-dashboard', target: 'asset-service', label: 'Asset catalog reads', type: 'sync' },
         { source: 'ops-console', target: 'dispatch-service', label: 'Operations data', type: 'sync' },
         { source: 'ops-console', target: 'asset-service', label: 'Asset inventory', type: 'sync' },
         { source: 'meter-service', target: 'rabbitmq', label: 'Meter events', type: 'async' },
         { source: 'meter-service', target: 'mongodb', label: 'Meter readings', type: 'sync' },
         { source: 'rabbitmq', target: 'dispatch-service', label: 'Dispatch commands', type: 'async' },
         { source: 'dispatch-service', target: 'mongodb', label: 'Grid state writes', type: 'sync' },
         { source: 'asset-service', target: 'mongodb', label: 'Asset catalog data', type: 'sync' },
         { source: 'dispatch-service', target: 'asset-service', label: 'Asset lookups', type: 'sync' },
         { source: 'asset-service', target: 'forecast-service', label: 'Demand forecast', type: 'sync', optional: true },
         { source: 'load-simulator', target: 'meter-service', label: 'Simulated meter usage', type: 'sync' },
         { source: 'grid-worker', target: 'dispatch-service', label: 'Disabled dispatch processing path', type: 'sync', disabled: true }
       ]
      };
      const MAP_NODE = { width: 176, height: 76 };
      const SVG_NS = 'http://www.w3.org/2000/svg';
      const LIVE_HEALTH_TIMEOUT_MS = 3000;
      const MAP_HEALTH_POLL_MS = 30000;
      const STALE_AFTER_MS = 60000;
      const SEVERITY_RANK = { healthy: 0, warning: 1, critical: 2 };
       const mapState = { x: 0, y: 0, k: 1, rendered: false, dragging: false, dragX: 0, dragY: 0, dragMoved: false, healthById: {}, lastSuccessfulHealthPoll: null, healthPollInFlight: false, selectedNodeId: null, selectedEdgeKey: null, activeFilter: 'all' };
     var _drawerLastFocus = null;
     var _drawerLastFocusNodeId = null;

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString(); }

    function updateMetrics() {
      document.getElementById('queue-depth').textContent = rand(5, 42);
      document.getElementById('active-dispatches').textContent = rand(3, 18);
      document.getElementById('efficiency').innerHTML = (92 + Math.random() * 7).toFixed(1) + '<sub> %</sub>';
      document.getElementById('alert-count').textContent = rand(2, 15);
    }

    function loadDispatches() {
      const tbody = document.getElementById('dispatch-body');
      tbody.innerHTML = '';
      const count = rand(5, 10);
      for (let i = 0; i < count; i++) {
        const priority = PRIORITIES[rand(0, 3)];
        const pclass = priority === 'Critical' ? 'offline' : priority === 'High' ? 'warning' : 'online';
        const statuses = ['Processing', 'Queued', 'Executing', 'Completed'];
        const status = statuses[rand(0, 3)];
        const sclass = status === 'Completed' ? 'online' : status === 'Executing' ? 'processing' : 'warning';
        const tr = document.createElement('tr');
        tr.innerHTML = '<td>DSP-' + rand(10000, 99999) + '</td>' +
          '<td>' + DISPATCH_TYPES[rand(0, DISPATCH_TYPES.length - 1)] + '</td>' +
          '<td>' + ZONES[rand(0, ZONES.length - 1)] + '</td>' +
          '<td><span class="badge ' + pclass + '">' + priority + '</span></td>' +
          '<td><span class="badge ' + sclass + '">' + status + '</span></td>' +
          '<td>Unit-' + rand(1, 20) + '</td>';
        tbody.appendChild(tr);
      }
    }

    function loadAssets() {
      fetch('/api/assets/')
        .then(r => r.json())
        .then(items => {
          const tbody = document.getElementById('assets-body');
          tbody.innerHTML = '';
          items.forEach((item, i) => {
            const type = ASSET_TYPES[i % ASSET_TYPES.length];
            const assetName = ASSET_NAMES[i % ASSET_NAMES.length];
            const output = rand(20, 450) + ' MW';
            const eff = (85 + Math.random() * 14).toFixed(1) + '%';
            const statusRoll = Math.random();
            const status = statusRoll > 0.1 ? 'online' : statusRoll > 0.03 ? 'warning' : 'offline';
            const label = status === 'online' ? 'Running' : status === 'warning' ? 'Degraded' : 'Offline';
            const tr = document.createElement('tr');
            tr.innerHTML = '<td>EGA-' + String(item.id || i + 1).padStart(4, '0') + '</td>' +
              '<td>' + assetName + '</td>' +
              '<td>' + type + '</td><td>' + output + '</td><td>' + eff + '</td>' +
              '<td><span class="badge ' + status + '">' + label + '</span></td>';
            tbody.appendChild(tr);
          });
        })
        .catch(() => {
          document.getElementById('assets-body').innerHTML =
            '<tr><td colspan="6" style="color:var(--red)">&#9888; Asset Service unavailable</td></tr>';
        });
    }

    const LOG_MESSAGES = [
      { level: 'info', msg: 'Dispatch DSP-{id} completed for {zone}' },
      { level: 'info', msg: 'Meter batch processed: {n} readings ingested' },
      { level: 'info', msg: 'Load balancer adjusted output for {zone}' },
      { level: 'warn', msg: 'High latency detected on meter-service ({n}ms)' },
      { level: 'warn', msg: 'Queue depth elevated: {n} pending events' },
      { level: 'info', msg: 'Asset EGA-{id} health check passed' },
      { level: 'err',  msg: 'Connection timeout to MongoDB replica' },
      { level: 'info', msg: 'Grid frequency normalized: 60.00 Hz' },
      { level: 'warn', msg: 'Dispatch backlog growing in {zone}' },
      { level: 'info', msg: 'RabbitMQ consumer reconnected successfully' },
    ];

    function addLogEntry() {
      const box = document.getElementById('ops-log');
      const tmpl = LOG_MESSAGES[rand(0, LOG_MESSAGES.length - 1)];
      const ts = new Date().toLocaleTimeString();
      const text = tmpl.msg.replace('{id}', rand(1000, 9999)).replace('{zone}', ZONES[rand(0, 4)]).replace('{n}', rand(10, 500));
      const line = document.createElement('div');
      line.innerHTML = '<span class="ts">[' + ts + ']</span> <span class="' + tmpl.level + '">[' + tmpl.level.toUpperCase() + ']</span> ' + text;
      box.prepend(line);
      if (box.children.length > 50) box.removeChild(box.lastChild);
    }

      function liveHealthNodes() {
        return GRID_TOPOLOGY.nodes.filter(node => node.healthSource === 'live' && node.healthPath);
      }

      function createTimeoutSignal(timeoutMs) {
        if (window.AbortSignal && AbortSignal.timeout) return AbortSignal.timeout(timeoutMs);
        const controller = new AbortController();
        window.setTimeout(() => controller.abort(), timeoutMs);
        return controller.signal;
      }

      function severityForHttpStatus(status) {
        if (status >= 200 && status < 300) return 'healthy';
        if (status >= 400 && status < 500) return 'warning';
        if (status >= 500) return 'critical';
        return 'warning';
      }

      function healthTextForResult(result) {
        if (!result) return 'checking live health';
        if (result.reason === 'network') return 'critical - endpoint unreachable';
        if (result.severity === 'healthy') return 'healthy - HTTP ' + result.httpStatus;
        if (result.severity === 'warning') return 'warning - HTTP ' + result.httpStatus;
        if (result.severity === 'critical') return 'critical - HTTP ' + result.httpStatus;
        return 'unknown';
      }

      function fetchLiveHealth(node) {
        const checkedAt = Date.now();
        return fetch(node.healthPath, { method: 'GET', cache: 'no-store', signal: createTimeoutSignal(LIVE_HEALTH_TIMEOUT_MS) })
          .then(response => ({
            id: node.id,
            severity: severityForHttpStatus(response.status),
            httpStatus: response.status,
            checkedAt,
            successAt: checkedAt,
            reason: 'http'
          }))
          .catch(error => ({
            id: node.id,
            severity: 'critical',
            checkedAt,
            successAt: null,
            reason: 'network',
            errorName: error && error.name ? error.name : 'NetworkError'
          }));
      }

      function statusDotClass(severity) {
        if (severity === 'healthy') return 'green';
        if (severity === 'warning') return 'amber';
        if (severity === 'critical') return 'red';
        return 'unknown';
      }

      function renderHealthGrid() {
        const grid = document.getElementById('health-grid');
        if (!grid) return;
        grid.innerHTML = '';
        const svcs = [
          ...liveHealthNodes().map(node => ({ name: node.label, node })),
          { name: 'MongoDB', staticText: 'Static in-cluster - no browser health endpoint' },
          { name: 'RabbitMQ', staticText: 'Static in-cluster - no browser health endpoint' },
        ];
        svcs.forEach(svc => {
          const card = document.createElement('div');
          card.className = 'card';
          if (svc.node) {
            const result = mapState.healthById[svc.node.id];
            const severity = result ? result.severity : 'unknown';
            const dotClass = statusDotClass(severity);
            const label = result ? healthTextForResult(result) : 'Checking approved health endpoint...';
            card.innerHTML = '<h3>' + svc.name + '</h3><div style="color:var(--' + (severity === 'warning' ? 'amber' : severity === 'critical' ? 'red' : severity === 'healthy' ? 'green' : 'muted') + ')"><span class="dot ' + dotClass + '"></span> ' + label + '</div>';
          } else {
            card.innerHTML = '<h3>' + svc.name + '</h3><div style="color:var(--muted)"><span class="dot green"></span> ' + svc.staticText + '</div>';
          }
          grid.appendChild(card);
        });
      }

      function updateMapHealthBanner() {
        const banner = document.getElementById('map-health-banner');
        if (!banner) return;
        const now = Date.now();
        const last = mapState.lastSuccessfulHealthPoll;
        if (!last) {
          banner.hidden = false;
          banner.className = 'map-health-banner warning';
          banner.textContent = mapState.healthPollInFlight
            ? 'Checking approved cloud demo health endpoints. Static and optional nodes remain in safe unknown/static state while live data loads.'
            : 'Live service health is unavailable. The map is showing safe severity states from the last known cloud demo contract, with endpoint failures marked critical only for application health.';
          return;
        }
        const age = now - last;
        if (age > STALE_AFTER_MS) {
          banner.hidden = false;
          banner.className = 'map-health-banner warning';
          banner.textContent = 'Live service health data is stale (' + Math.round(age / 1000) + 's since the last successful health response). Static and optional nodes are not treated as causal impact.';
          return;
        }
        banner.hidden = true;
      }

      function refreshGridMapAfterHealthChange() {
        mapState.rendered = false;
        const mapView = document.getElementById('map-view');
        if (mapView && !mapView.hidden) renderGridMap({ preserveViewport: true });
        refreshDetailDrawerIfOpen();
      }

      function loadHealth() {
        if (mapState.healthPollInFlight) return;
        mapState.healthPollInFlight = true;
        renderHealthGrid();
        updateMapHealthBanner();
        Promise.all(liveHealthNodes().map(fetchLiveHealth))
          .then(results => {
            let newestSuccess = mapState.lastSuccessfulHealthPoll;
            results.forEach(result => {
              mapState.healthById[result.id] = result;
              if (result.successAt && (!newestSuccess || result.successAt > newestSuccess)) newestSuccess = result.successAt;
            });
            mapState.lastSuccessfulHealthPoll = newestSuccess;
          })
          .catch(() => {
            liveHealthNodes().forEach(node => {
              if (!mapState.healthById[node.id]) {
                mapState.healthById[node.id] = { id: node.id, severity: 'critical', checkedAt: Date.now(), successAt: null, reason: 'network' };
              }
            });
          })
         .finally(() => {
           mapState.healthPollInFlight = false;
           renderHealthGrid();
           updateMapHealthBanner();
           refreshGridMapAfterHealthChange();
           updateFilterBadges();
         });
       }

     function createSvgElement(name, attrs) {
       const el = document.createElementNS(SVG_NS, name);
       Object.keys(attrs || {}).forEach(key => el.setAttribute(key, attrs[key]));
       return el;
     }

      function getMapStatus(node) {
        if (node.replicas === 0) return { text: 'disabled - replicas 0', className: 'disabled', severity: 'unknown', symbol: 'Ⅱ' };
        if (node.optional) return { text: 'optional absent', className: 'unknown', severity: 'unknown', symbol: '?' };
        if (node.healthSource === 'live') {
          const result = mapState.healthById[node.id];
          if (!result) return { text: 'checking live health', className: 'unknown', severity: 'unknown', symbol: '?' };
          const symbol = result.severity === 'healthy' ? '✓' : result.severity === 'warning' ? '!' : '×';
          return { text: healthTextForResult(result), className: result.severity, severity: result.severity, symbol };
        }
        return { text: 'static in-cluster', className: 'static', severity: 'unknown', symbol: 'S' };
      }

      function getEdgeStatus(edge, source, target) {
        if (edge.disabled) return { className: 'disabled', label: 'disabled path' };
        const sourceStatus = getMapStatus(source);
        const targetStatus = getMapStatus(target);
        const known = [sourceStatus.severity, targetStatus.severity].filter(severity => severity in SEVERITY_RANK);
        if (known.includes('critical')) return { className: 'critical', label: 'visual impact: critical endpoint' };
        if (known.includes('warning')) return { className: 'warning', label: 'visual impact: warning endpoint' };
        if (known.length === 2 && known.every(severity => severity === 'healthy')) return { className: 'healthy', label: 'both endpoints healthy' };
        return { className: 'unknown', label: 'unknown/static endpoint state' };
      }

     function updateSelectionStatus(text) {
       var el = document.getElementById('map-selection-status');
       if (el) el.textContent = text;
     }

     function escHtml(str) {
       if (str === null || str === undefined) return '';
       return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
     }
     function fmtTime(ts) {
       if (!ts) return 'unknown time';
       return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
     }
     function citationTimestamp() {
       var ts = mapState.lastSuccessfulHealthPoll;
       return ts ? fmtTime(ts) : 'session start';
     }
     function buildNodeBody(node) {
       var status = getMapStatus(node);
       var result = node.healthSource === 'live' ? (mapState.healthById[node.id] || null) : null;
       var html = '';
       html += '<div class="drawer-section">';
       html += '<h3 class="drawer-section-title">Status</h3>';
       html += '<div class="drawer-row"><span class="drawer-label">Reported status</span><span class="drawer-value ' + escHtml(status.className) + '">' + escHtml(status.text) + '</span></div>';
       html += '<div class="drawer-row"><span class="drawer-label">Role</span><span class="drawer-value">' + escHtml(node.metaphor) + '</span></div>';
       html += '<div class="drawer-row"><span class="drawer-label">Kind</span><span class="drawer-value">' + escHtml(node.kind) + '</span></div>';
       html += '<div class="drawer-row"><span class="drawer-label">Resource</span><span class="drawer-value">' + escHtml(node.resourceName) + '</span></div>';
       if (node.replicas === 0) {
         html += '<div class="drawer-row"><span class="drawer-label">Replicas</span><span class="drawer-value warning">0 \u2014 disabled</span></div>';
       }
       html += '</div>';
       html += '<div class="drawer-section">';
       html += '<h3 class="drawer-section-title">Health source</h3>';
       if (node.healthSource === 'live' && result) {
         html += '<div class="drawer-row"><span class="drawer-label">Source</span><span class="drawer-value">Cloud demo live endpoint</span></div>';
         html += '<div class="drawer-row"><span class="drawer-label">HTTP status</span><span class="drawer-value">' + (result.httpStatus ? result.httpStatus : '\u2014') + '</span></div>';
         html += '<div class="drawer-row"><span class="drawer-label">Checked at</span><span class="drawer-value">' + escHtml(fmtTime(result.checkedAt)) + '</span></div>';
         if (result.reason === 'network') {
           html += '<div class="drawer-assessment">This service currently reports as unreachable from the browser. This may indicate an application health issue or a network configuration in the demo environment. This does not represent real grid operations.</div>';
         } else if (result.severity === 'critical') {
           html += '<div class="drawer-assessment">This service currently reports a server error response. This may indicate an application health issue in the cloud demo. The visual impact on connected edges reflects this status.</div>';
         } else if (result.severity === 'warning') {
           html += '<div class="drawer-assessment">This service currently reports a non-success response. This may indicate a degraded condition in the cloud demo. The visual impact on connected edges reflects this status.</div>';
         }
       } else if (node.healthSource === 'live' && !result) {
         html += '<div class="drawer-row"><span class="drawer-label">Source</span><span class="drawer-value">Cloud demo live endpoint</span></div>';
         html += '<span class="skeleton long"></span><span class="skeleton short"></span>';
         html += '<div class="drawer-assessment">Checking approved health endpoint&#x2026; Skeleton shown while live data loads.</div>';
       } else if (node.healthSource === 'static') {
         html += '<div class="drawer-row"><span class="drawer-label">Source</span><span class="drawer-value">Static in-cluster</span></div>';
         html += '<div class="drawer-assessment">No browser-accessible health endpoint is available for this node under the cloud demo contract. Health is inferred from topology context only.</div>';
       } else if (node.healthSource === 'optional') {
         html += '<div class="drawer-row"><span class="drawer-label">Source</span><span class="drawer-value">Optional \u2014 absent</span></div>';
         html += '<div class="drawer-assessment">This optional service was not detected in the current cloud demo deployment. No health data is available.</div>';
       }
       if (node.stateNote) {
         html += '<div class="drawer-row" style="margin-top:.3rem"><span class="drawer-label">Note</span><span class="drawer-value" style="text-align:left;color:var(--muted)">' + escHtml(node.stateNote) + '</span></div>';
       }
       html += '</div>';
       html += '<div class="drawer-section">';
       html += '<h3 class="drawer-section-title">Optional details</h3>';
       html += '<div class="drawer-unavailable">Pod-level metrics, recent events, and application logs are not available from the V1 cloud demo health contract. This panel shows only the health snapshot from the approved cloud demo data source.</div>';
       html += '</div>';
       html += buildHandoffSection(buildNodePrompt(node));
       return html;
     }
     function buildEdgeBody(edge, src, tgt) {
       var srcStatus = getMapStatus(src);
       var tgtStatus = getMapStatus(tgt);
       var edgeStatus = getEdgeStatus(edge, src, tgt);
       var html = '';
       html += '<div class="drawer-section">';
       html += '<h3 class="drawer-section-title">Connection</h3>';
       html += '<div class="drawer-row"><span class="drawer-label">Flow type</span><span class="drawer-value">' + escHtml(edge.type || 'sync') + '</span></div>';
       if (edge.disabled) html += '<div class="drawer-row"><span class="drawer-label">State</span><span class="drawer-value warning">Disabled path</span></div>';
       if (edge.optional) html += '<div class="drawer-row"><span class="drawer-label">Optional</span><span class="drawer-value">Yes \u2014 may be absent</span></div>';
       html += '</div>';
       html += '<div class="drawer-section">';
       html += '<h3 class="drawer-section-title">Source endpoint</h3>';
       html += '<div class="drawer-row"><span class="drawer-label">Service</span><span class="drawer-value">' + escHtml(src.label) + '</span></div>';
       html += '<div class="drawer-row"><span class="drawer-label">Role</span><span class="drawer-value">' + escHtml(src.metaphor) + '</span></div>';
       html += '<div class="drawer-row"><span class="drawer-label">Status</span><span class="drawer-value ' + escHtml(srcStatus.className) + '">' + escHtml(srcStatus.text) + '</span></div>';
       html += '</div>';
       html += '<div class="drawer-section">';
       html += '<h3 class="drawer-section-title">Target endpoint</h3>';
       html += '<div class="drawer-row"><span class="drawer-label">Service</span><span class="drawer-value">' + escHtml(tgt.label) + '</span></div>';
       html += '<div class="drawer-row"><span class="drawer-label">Role</span><span class="drawer-value">' + escHtml(tgt.metaphor) + '</span></div>';
       html += '<div class="drawer-row"><span class="drawer-label">Status</span><span class="drawer-value ' + escHtml(tgtStatus.className) + '">' + escHtml(tgtStatus.text) + '</span></div>';
       html += '</div>';
       html += '<div class="drawer-section">';
       html += '<h3 class="drawer-section-title">Connection assessment</h3>';
       var assess = '';
       if (edge.disabled) {
         assess = 'This connection path is disabled in the current deployment. No active data flow is expected on this path.';
       } else if (edgeStatus.className === 'healthy') {
         assess = 'Both endpoints currently report healthy status. This connection path currently reports no visual impact.';
       } else if (edgeStatus.className === 'critical') {
         assess = 'One or more endpoints on this connection currently report a critical health status. The visual impact on this edge reflects the endpoint state. This may indicate an application health issue in the cloud demo environment.';
       } else if (edgeStatus.className === 'warning') {
         assess = 'One or more endpoints on this connection currently report a warning health status. The visual impact on this edge reflects the endpoint state. This may indicate a degraded condition in the cloud demo environment.';
       } else {
         assess = 'One or more endpoints are in an unknown or static state. Visual impact cannot be fully determined from the current cloud demo health data.';
       }
       html += '<div class="drawer-assessment">' + escHtml(assess) + '</div>';
       html += '</div>';
       html += '<div class="drawer-section">';
       html += '<h3 class="drawer-section-title">Optional details</h3>';
