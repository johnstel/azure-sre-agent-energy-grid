# =============================================================================
# Energy Grid Platform - Base Application Deployment
# =============================================================================
# This is the healthy baseline deployment of the Energy Grid Operations
# Platform for demonstrating Azure SRE Agent diagnosis capabilities.
#
# Architecture:
# - grid-dashboard: Vue.js consumer portal (usage, billing, outage maps)
# - ops-console: Vue.js grid operations console
# - meter-service: Node.js smart meter data ingestion
# - asset-service: Rust-based energy asset catalog
# - dispatch-service: Go energy dispatch and load balancing
# - forecast-service: Python energy demand forecasting (optional)
# - load-simulator: Retail consumer usage pattern generator
# - grid-worker: Dispatch processing simulator
#
# Data Services (in-cluster):
# - rabbitmq: Event bus (meter events, grid alerts, dispatch commands)
# - mongodb: Meter readings, energy transactions, grid state
# =============================================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: energy
  labels:
    app.kubernetes.io/part-of: energy-grid-demo
    sre-agent-demo: "true"

---
# =============================================================================
# RabbitMQ - Event Bus (meter events, grid alerts, dispatch commands)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: energy
  labels:
    app: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      nodeSelector:
        nodepool-type: user
      containers:
        - name: rabbitmq
          image: rabbitmq:3.11-management-alpine
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "check_port_connectivity"]
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "check_port_connectivity"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 6
          env:
            - name: RABBITMQ_DEFAULT_USER
              value: "guest"
            - name: RABBITMQ_DEFAULT_PASS
              value: "guest"

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: energy
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672

---
# =============================================================================
# MongoDB - Meter Data Storage (Azure Managed Disk via CSI driver)
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-data-pvc
  namespace: energy
  labels:
    app: mongodb
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: managed-csi # Uses Azure Managed Disk CSI driver (default in AKS)
  resources:
    requests:
      storage: 8Gi

---
# =============================================================================
# MongoDB - Meter Database
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: energy
  labels:
    app: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      nodeSelector:
        nodepool-type: user
      containers:
        - name: mongodb
          image: mongo:4.4
          ports:
            - containerPort: 27017
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: mongodb-data-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: energy
spec:
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017

---
# =============================================================================
# Asset Service - Rust-based energy asset catalog API
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asset-service
  namespace: energy
  labels:
    app: asset-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: asset-service
  template:
    metadata:
      labels:
        app: asset-service
    spec:
      nodeSelector:
        nodepool-type: user
      containers:
        - name: asset-service
          image: ghcr.io/azure-samples/aks-store-demo/product-service:latest
          ports:
            - containerPort: 3002
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          env:
            - name: AI_SERVICE_URL
              value: "http://forecast-service:5001/"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: asset-service
  namespace: energy
spec:
  selector:
    app: asset-service
  ports:
    - port: 3002
      targetPort: 3002

---
# =============================================================================
# Meter Service - Node.js smart meter data ingestion API
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: meter-service
  namespace: energy
  labels:
    app: meter-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: meter-service
  template:
    metadata:
      labels:
        app: meter-service
    spec:
      nodeSelector:
        nodepool-type: user
      containers:
        - name: meter-service
          image: ghcr.io/azure-samples/aks-store-demo/order-service:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          env:
            - name: ORDER_QUEUE_HOSTNAME
              value: "rabbitmq"
            - name: ORDER_QUEUE_PORT
              value: "5672"
            - name: ORDER_QUEUE_USERNAME
              value: "guest"
            - name: ORDER_QUEUE_PASSWORD
              value: "guest"
            - name: ORDER_QUEUE_NAME
              value: "meter-events"
            - name: FASTIFY_ADDRESS
              value: "0.0.0.0"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: meter-service
  namespace: energy
spec:
  selector:
    app: meter-service
  ports:
    - port: 3000
      targetPort: 3000

---
# =============================================================================
# Dispatch Service - Go energy dispatch and load balancing
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatch-service
  namespace: energy
  labels:
    app: dispatch-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dispatch-service
  template:
    metadata:
      labels:
        app: dispatch-service
    spec:
      nodeSelector:
        nodepool-type: user
      containers:
        - name: dispatch-service
          image: ghcr.io/azure-samples/aks-store-demo/makeline-service:latest
          ports:
            - containerPort: 3001
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          env:
            - name: ORDER_QUEUE_URI
              value: "amqp://guest:guest@rabbitmq:5672/"
            - name: ORDER_QUEUE_USERNAME
              value: "guest"
            - name: ORDER_QUEUE_PASSWORD
              value: "guest"
            - name: ORDER_QUEUE_NAME
              value: "meter-events"
            - name: ORDER_DB_URI
              value: "mongodb://mongodb:27017"
            - name: ORDER_DB_NAME
              value: "energydb"
            - name: ORDER_DB_COLLECTION_NAME
              value: "meter_readings"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: dispatch-service
  namespace: energy
spec:
  selector:
    app: dispatch-service
  ports:
    - port: 3001
      targetPort: 3001

---
# =============================================================================
# Grid Dashboard - Vue.js consumer portal
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grid-dashboard
  namespace: energy
  labels:
    app: grid-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: grid-dashboard
  template:
    metadata:
      labels:
        app: grid-dashboard
    spec:
      nodeSelector:
        nodepool-type: user
      containers:
        - name: grid-dashboard
          image: ghcr.io/azure-samples/aks-store-demo/store-front:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          env:
            - name: VUE_APP_ORDER_SERVICE_URL
              value: "http://meter-service:3000/"
            - name: VUE_APP_PRODUCT_SERVICE_URL
              value: "http://asset-service:3002/"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: grid-dashboard
  namespace: energy
spec:
  type: LoadBalancer
  selector:
    app: grid-dashboard
  ports:
    - port: 80
      targetPort: 8080

---
# =============================================================================
# Ops Console - Vue.js grid operations console
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ops-console
  namespace: energy
  labels:
    app: ops-console
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ops-console
  template:
    metadata:
      labels:
        app: ops-console
    spec:
      nodeSelector:
        nodepool-type: user
      containers:
        - name: ops-console
          image: ghcr.io/azure-samples/aks-store-demo/store-admin:latest
          ports:
            - containerPort: 8081
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          env:
            - name: VUE_APP_PRODUCT_SERVICE_URL
              value: "http://asset-service:3002/"
            - name: VUE_APP_MAKELINE_SERVICE_URL
              value: "http://dispatch-service:3001/"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: ops-console
  namespace: energy
spec:
  type: LoadBalancer
  selector:
    app: ops-console
  ports:
    - port: 80
      targetPort: 8081

---
# =============================================================================
# Load Simulator - Retail consumer usage pattern generator
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-simulator
  namespace: energy
  labels:
    app: load-simulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-simulator
  template:
    metadata:
      labels:
        app: load-simulator
    spec:
      nodeSelector:
        nodepool-type: user
      containers:
        - name: load-simulator
          image: ghcr.io/azure-samples/aks-store-demo/virtual-customer:latest
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "50m"
          env:
            - name: ORDER_SERVICE_URL
              value: "http://meter-service:3000/"
            - name: ORDERS_PER_HOUR
              value: "100"

---
# =============================================================================
# Grid Worker - Dispatch processing simulator (disabled by default)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grid-worker
  namespace: energy
  labels:
    app: grid-worker
spec:
  replicas: 0 # Disabled: AMQP protocol mismatch with RabbitMQ 3.11
  selector:
    matchLabels:
      app: grid-worker
  template:
    metadata:
      labels:
        app: grid-worker
    spec:
      nodeSelector:
        nodepool-type: user
      containers:
        - name: grid-worker
          image: ghcr.io/azure-samples/aks-store-demo/virtual-worker:latest
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "50m"
          env:
            - name: MAKELINE_SERVICE_URL
              value: "http://dispatch-service:3001"
            - name: ORDERS_PER_HOUR
              value: "100"
