       svg.addEventListener('keydown', event => {
         const step = 26;
         if (event.key === 'Escape') { clearSelection(); return; }
         if (event.key === 'Enter') {
           const nodeGroup = event.target.closest ? event.target.closest('.map-node') : null;
           if (nodeGroup && nodeGroup.dataset.nodeId) { selectNode(nodeGroup.dataset.nodeId); event.preventDefault(); return; }
         }
         if (event.key === '+' || event.key === '=') { zoomGridMap(1.12); event.preventDefault(); return; }
         if (event.key === '-' || event.key === '_') { zoomGridMap(0.88); event.preventDefault(); return; }
         if (event.key === '0') { fitGridMap(); event.preventDefault(); return; }
         if (event.key === 'ArrowLeft') { mapState.x += step; applyMapTransform(); event.preventDefault(); return; }
         if (event.key === 'ArrowRight') { mapState.x -= step; applyMapTransform(); event.preventDefault(); return; }
         if (event.key === 'ArrowUp') { mapState.y += step; applyMapTransform(); event.preventDefault(); return; }
         if (event.key === 'ArrowDown') { mapState.y -= step; applyMapTransform(); event.preventDefault(); }
       });
     }

     function initialViewFromLocation() {
       const params = new URLSearchParams(window.location.search);
       const hashView = window.location.hash.replace('#', '').toLowerCase();
       return params.get('view') === 'map' || hashView === 'map' || hashView === 'grid-map' ? 'map' : 'operations';
     }

     function setConsoleView(view, updateUrl) {
       const selected = view === 'map' ? 'map' : 'operations';
       document.querySelectorAll('.app-view').forEach(section => { section.hidden = section.dataset.view !== selected; });
       document.querySelectorAll('[data-view-target]').forEach(button => {
         button.setAttribute('aria-selected', button.dataset.viewTarget === selected ? 'true' : 'false');
       });
       if (updateUrl) {
         const url = new URL(window.location.href);
         if (selected === 'map') url.searchParams.set('view', 'map');
         else url.searchParams.delete('view');
         url.hash = '';
         history.replaceState({ view: selected }, '', url);
       }
       if (selected === 'map') {
         renderGridMap();
         window.setTimeout(fitGridMap, 0);
         resetMapIdleTimer();
       } else {
         if (_mapIdleTimer) { clearTimeout(_mapIdleTimer); _mapIdleTimer = null; }
       }
     }

     const IDLE_TIMEOUT_MS = 30000;
     var _mapIdleTimer = null;
     function resetMapIdleTimer() {
       if (_mapIdleTimer) { clearTimeout(_mapIdleTimer); _mapIdleTimer = null; }
       var mapView = document.getElementById('map-view');
       if (!mapView || mapView.hidden) return;
       _mapIdleTimer = window.setTimeout(function() {
         _mapIdleTimer = null;
         var mv = document.getElementById('map-view');
         if (!mv || mv.hidden) return;
         if (mapState && mapState.dragging) { resetMapIdleTimer(); return; }
         clearSelection();
         fitGridMap();
       }, IDLE_TIMEOUT_MS);
     }
     function initIdleTracking() {
       var shell = document.getElementById('grid-map-shell');
       if (shell) {
         ['pointerdown', 'keydown', 'wheel'].forEach(function(evtType) {
           shell.addEventListener(evtType, resetMapIdleTimer, { passive: true });
         });
       }
       var filterBar = document.querySelector('.filter-bar');
       if (filterBar) {
         filterBar.addEventListener('click', resetMapIdleTimer);
         filterBar.addEventListener('keydown', resetMapIdleTimer);
       }
       var mapControls = document.querySelector('.map-controls');
       if (mapControls) { mapControls.addEventListener('click', resetMapIdleTimer); }
     }

     function initViewToggle() {
       initSeverityFilter();
       document.querySelectorAll('[data-view-target]').forEach(button => {
         button.addEventListener('click', () => setConsoleView(button.dataset.viewTarget, true));
       });
       window.addEventListener('popstate', () => setConsoleView(initialViewFromLocation(), false));
       window.addEventListener('hashchange', () => setConsoleView(initialViewFromLocation(), false));
       document.getElementById('map-reset').addEventListener('click', fitGridMap);
       document.getElementById('map-zoom-in').addEventListener('click', () => zoomGridMap(1.12));
       document.getElementById('map-zoom-out').addEventListener('click', () => zoomGridMap(0.88));
       window.addEventListener('resize', () => {
         if (!document.getElementById('map-view').hidden) fitGridMap();
       });
       setConsoleView(initialViewFromLocation(), false);
     }

     initViewToggle(); initDetailDrawer(); initIdleTracking();
     updateClock(); updateMetrics(); loadDispatches(); loadAssets(); loadHealth();
    for (let i = 0; i < 10; i++) addLogEntry();
    setInterval(updateClock, 1000);
     setInterval(updateMetrics, 5000);
     setInterval(loadDispatches, 10000);
     setInterval(addLogEntry, 3000);
     setInterval(loadHealth, MAP_HEALTH_POLL_MS);
     setInterval(updateMapHealthBanner, 5000);
     setInterval(loadAssets, 60000);
    </script>
    </body>
    </html>

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ops-console-nginx
  namespace: energy
data:
  default.conf: |
    server {
        listen 8081;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
        resolver kube-dns.kube-system.svc.cluster.local valid=5s;

        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
        location /api/assets/ {
            set $asset_backend http://asset-service.energy.svc.cluster.local:3002;
            proxy_pass $asset_backend/;
        }
        location /api/meter/ {
            set $meter_backend http://meter-service.energy.svc.cluster.local:3000;
            proxy_pass $meter_backend/;
        }
        location /api/dispatch/ {
            set $dispatch_backend http://dispatch-service.energy.svc.cluster.local:3001;
            proxy_pass $dispatch_backend/;
        }
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ops-console
  namespace: energy
  labels:
    app: ops-console
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ops-console
  template:
    metadata:
      labels:
        app: ops-console
    spec:
      nodeSelector:
        nodepool-type: user
      containers:
        - name: ops-console
          image: nginx:alpine
          ports:
            - containerPort: 8081
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: html
          configMap:
            name: ops-console-html
        - name: nginx-conf
          configMap:
            name: ops-console-nginx

---
apiVersion: v1
kind: Service
metadata:
  name: ops-console
  namespace: energy
spec:
  type: LoadBalancer
  selector:
    app: ops-console
  ports:
    - port: 80
      targetPort: 8081

